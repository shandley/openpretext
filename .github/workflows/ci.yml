name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Report coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements |', fmt(c.statements), '|');
              console.log('| Branches |', fmt(c.branches), '|');
              console.log('| Functions |', fmt(c.functions), '|');
              console.log('| Lines |', fmt(c.lines), '|');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (browser + deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: npx playwright test

      - name: Build
        run: npm run build

      - name: Smoke test production build
        # Serves the built dist/ via `vite preview` at the real deploy base
        # (/openpretext/) and checks it boots with no asset/console errors — the
        # dev-server E2E suite above never exercises the shipped artifact.
        run: npx playwright test --config playwright.smoke.config.ts

      - name: Download example datasets into dist
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          mkdir -p dist/data
          gh release download v0.2.0-data \
            --pattern '*.pretext' \
            --dir dist/data
          rm -f dist/data/*_post.pretext
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  bench-regression:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the specimens keyed on the immutable release tag: once a run has
      # populated the cache, later runs skip the ~584 MB download entirely,
      # which also removes it as a flake source.
      - name: Restore cached regression specimens
        id: specimens-cache
        uses: actions/cache/restore@v4
        with:
          path: bench/data/regression
          key: regression-specimens-v0.2.0-data

      - name: Download regression specimens
        id: download-specimens
        if: steps.specimens-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bench/data/regression
          for attempt in 1 2 3; do
            if gh release download v0.2.0-data \
                 --pattern '*.pretext' \
                 --dir bench/data/regression --clobber; then
              break
            fi
            echo "download attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          count=$(ls bench/data/regression/*.pretext 2>/dev/null | wc -l | tr -d ' ')
          echo "downloaded $count specimen file(s)"
          echo "count=$count" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save regression specimens cache
        if: steps.specimens-cache.outputs.cache-hit != 'true' && steps.download-specimens.outputs.count != '0'
        uses: actions/cache/save@v4
        with:
          path: bench/data/regression
          key: regression-specimens-v0.2.0-data

      # Fails the job (and, via the deploy gate below, blocks the deploy) only on
      # a genuine metric regression. A missing/flaky download makes it skip with
      # a warning, so infra hiccups never block a deploy.
      - name: Run regression benchmarks
        run: npx tsx bench/cli.ts regression --data-dir bench/data/regression

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # Gate the deploy on the regression benchmark: a genuine AutoSort/AutoCut
    # accuracy drop blocks the deploy; an infra skip (see above) does not.
    needs: [ci, bench-regression]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
